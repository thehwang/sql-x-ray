# Example SQLucent lint config. Copy to your project root as `.sqlucent.toml`;
# `sqlucent --lint file.sql` auto-discovers it from the file's directory upward.

[rules]
# Turn rules off entirely.
disable = ["distinct-with-group-by"]

[rules.severity]
# Override a rule's severity (low | medium | high).
select-star = "low"

[cost]
# Master switch for the partition cost rule.
require_partition_filter = true
# --cost (schema-driven byte estimate) knobs:
price_per_tb = 6.25          # USD per TB scanned (BigQuery on-demand)
string_bytes = 16            # assumed avg width for STRING/BYTES values
partition_selectivity = 0.05 # fraction of a partitioned table a typical filter scans

[cost.partitions]
# Declare partitioned tables and their partition column. A scan of one of these
# tables without a WHERE filter on the partition column is flagged "high"
# (full-table scan = expensive in BigQuery).
events = "event_date"
orders = "order_ts"

[cost.table_rows]
# Optional row counts. With these, `--cost --schema ...` reports absolute bytes
# scanned and an estimated dollar cost (not just bytes/row).
events = 5_000_000_000
orders = 80_000_000
